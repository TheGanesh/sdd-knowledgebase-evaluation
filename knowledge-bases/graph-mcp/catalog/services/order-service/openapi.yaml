openapi: 3.1.0
info:
  title: order-service API
  version: 0.1.0
  description: Inbound REST contract harvested from springdoc /v3/api-docs.
servers:
  - url: http://localhost:8081
paths:
  /api/orders:
    post:
      operationId: createOrder
      summary: Create an order and synchronously reserve stock.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            example:
              customerId: 1
              sku: IPHONE-15-PRO
              quantity: 1
      responses:
        '201':
          description: Order created and stock reserved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              example:
                id: 1001
                customerId: 1
                sku: IPHONE-15-PRO
                quantity: 1
                status: CONFIRMED
                reservationId: 7b3f...-resv
                createdAt: "2026-06-06T12:00:00Z"
        '409':
          description: Stock not available (code OUT_OF_STOCK).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                code: OUT_OF_STOCK
                message: SKU NOKIA-G22 is not available in the requested quantity.
  /api/orders/{id}:
    get:
      operationId: getOrder
      summary: Fetch an order by id.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: The order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          description: Order not found (code NOT_FOUND).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
components:
  schemas:
    CreateOrderRequest:
      type: object
      required: [customerId, sku, quantity]
      properties:
        customerId:
          type: integer
          format: int64
        sku:
          type: string
        quantity:
          type: integer
          minimum: 1
    OrderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        customerId:
          type: integer
          format: int64
        sku:
          type: string
        quantity:
          type: integer
        status:
          type: string
          enum: [CREATED, CONFIRMED, CANCELLED]
        reservationId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    ApiError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

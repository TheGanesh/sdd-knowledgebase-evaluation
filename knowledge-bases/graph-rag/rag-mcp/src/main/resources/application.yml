server:
  port: 3003

spring:
  application:
    name: rag-mcp
  ai:
    mcp:
      server:
        name: graph-rag
        version: 0.1.0
        type: SYNC
        sse-endpoint: /sse
        sse-message-endpoint: /mcp/message
        instructions: >
          Graph-RAG over the service catalog. rag_search(query, k) returns the most semantically
          relevant KB chunks (local embeddings) plus their 1-hop dependency-graph neighbours.

# Built from the same canonical catalog as graph-mcp (the comparison isolates the access mode,
# not the data). Paths are relative to this module's directory (graph-rag/rag-mcp).
rag:
  catalog-root: ${CATALOG_ROOT:../../graph-mcp/catalog}
  index-file: ${RAG_INDEX:../index/vectorstore.json}
  rebuild: ${RAG_REBUILD:false}

logging:
  level:
    root: WARN
    com.ganesh.catalog: INFO

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <style>
      .mono{ font-family:'SF Mono','Menlo','Consolas',monospace }
      .big{ font-size:34px; font-weight:800 }
      .lbl{ font-size:11px; fill:#64748b }
    </style>
  </defs>
  <rect width="1000" height="470" fill="#ffffff"/>
  <text x="40" y="38" font-size="21" font-weight="700" fill="#1f2a37">Three knowledge bases, one catalog — which serves the agent best?</text>
  <text x="40" y="59" font-size="12" fill="#6b7787">Pairwise weighted score (the feature story is ground truth — no golden dataset). Criteria: completeness, scope, contracts, determinism, usability.</text>

  <!-- Markdown -->
  <rect x="40" y="84" width="280" height="320" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="40" y="84" width="280" height="44" rx="14" fill="#f1f5f9"/>
  <rect x="40" y="110" width="280" height="18" fill="#f1f5f9"/>
  <text x="60" y="112" font-size="17" font-weight="700" fill="#334155">Markdown KB</text>
  <text x="60" y="150" class="lbl">prose in context · read the pages</text>
  <text x="60" y="196" class="big" fill="#334155">0.67</text>
  <text x="158" y="196" font-size="13" fill="#64748b">weighted</text>
  <rect x="60" y="210" width="220" height="9" rx="4" fill="#e2e8f0"/>
  <rect x="60" y="210" width="147.4" height="9" rx="4" fill="#94a3b8"/>
  <text x="60" y="248" class="mono" font-size="12" fill="#64748b">completeness 0.65</text>
  <text x="60" y="268" class="mono" font-size="12" fill="#b45309">scope        1.00</text>
  <text x="60" y="288" class="mono" font-size="12" fill="#64748b">determinism  0.40</text>
  <line x1="60" y1="306" x2="300" y2="306" stroke="#e2e8f0"/>
  <text x="60" y="332" font-size="12.5" font-weight="700" fill="#334155">Most readable; never over-claims.</text>
  <text x="60" y="356" font-size="11.5" fill="#94a3b8">But misses non-local impact —</text>
  <text x="60" y="372" font-size="11.5" fill="#94a3b8">topic consumers, API callers.</text>

  <!-- Graph-RAG -->
  <rect x="360" y="84" width="280" height="320" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="360" y="84" width="280" height="44" rx="14" fill="#eff6ff"/>
  <rect x="360" y="110" width="280" height="18" fill="#eff6ff"/>
  <text x="380" y="112" font-size="17" font-weight="700" fill="#1e40af">Graph-RAG</text>
  <text x="380" y="150" class="lbl">semantic retrieval + graph expansion</text>
  <text x="380" y="196" class="big" fill="#1e40af">0.74</text>
  <text x="478" y="196" font-size="13" fill="#64748b">weighted</text>
  <rect x="380" y="210" width="220" height="9" rx="4" fill="#dbeafe"/>
  <rect x="380" y="210" width="162.8" height="9" rx="4" fill="#2563eb"/>
  <text x="380" y="248" class="mono" font-size="12" fill="#64748b">completeness 0.90</text>
  <text x="380" y="268" class="mono" font-size="12" fill="#b45309">scope        0.70</text>
  <text x="380" y="288" class="mono" font-size="12" fill="#64748b">determinism  0.60</text>
  <line x1="380" y1="306" x2="620" y2="306" stroke="#dbeafe"/>
  <text x="380" y="332" font-size="12.5" font-weight="700" fill="#1e40af">Recovers the hidden edges.</text>
  <text x="380" y="356" font-size="11.5" fill="#93a3c0">But over-expands on</text>
  <text x="380" y="372" font-size="11.5" fill="#93a3c0">single-service changes.</text>

  <!-- Graph + MCP (winner) -->
  <rect x="680" y="84" width="280" height="320" rx="14" fill="#ffffff" stroke="#0f766e" stroke-width="2.5"/>
  <rect x="680" y="84" width="280" height="44" rx="14" fill="#ecfdf5"/>
  <rect x="680" y="110" width="280" height="18" fill="#ecfdf5"/>
  <text x="700" y="112" font-size="17" font-weight="700" fill="#0f5e54">Graph + MCP</text>
  <text x="700" y="150" class="lbl">deterministic graph traversal</text>
  <rect x="852" y="92" width="92" height="22" rx="11" fill="#0f766e"/>
  <text x="898" y="107" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">WINNER</text>
  <text x="700" y="196" class="big" fill="#0f766e">0.97</text>
  <text x="812" y="196" font-size="13" fill="#64748b">weighted</text>
  <rect x="700" y="210" width="220" height="9" rx="4" fill="#d1fae5"/>
  <rect x="700" y="210" width="220" height="9" rx="4" fill="#0f766e"/>
  <text x="700" y="248" class="mono" font-size="12" fill="#0f766e">completeness 1.00</text>
  <text x="700" y="268" class="mono" font-size="12" fill="#0f766e">scope        1.00</text>
  <text x="700" y="288" class="mono" font-size="12" fill="#334155">determinism  1.00</text>
  <line x1="700" y1="306" x2="940" y2="306" stroke="#d1fae5"/>
  <text x="700" y="332" font-size="12.5" font-weight="700" fill="#0f5e54">Computes impact — wins overall.</text>
  <text x="700" y="356" font-size="11.5" fill="#5b9b8b">Cost: a built graph + a</text>
  <text x="700" y="372" font-size="11.5" fill="#5b9b8b">running MCP server.</text>

  <text x="40" y="438" font-size="11.5" fill="#94a3b8">All three are generated from the same catalog — the test isolates the access mode, not the data. Pairwise (margin 0.23); reference/gold mode ready for later.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
    <marker id="arAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#b45309"/>
    </marker>
  </defs>
  <rect width="1000" height="440" fill="#ffffff"/>
  <text x="40" y="38" font-size="20" font-weight="700" fill="#1f2a37">Where the knowledge base fits in Spec-Driven Development</text>
  <text x="40" y="59" font-size="12" fill="#6b7787">In SDD the agent writes the spec and — once approved — implements it. The spec is only as good as what the agent knows.</text>

  <rect x="30" y="100" width="180" height="84" rx="10" fill="#f8fafc" stroke="#b9c4d0" stroke-width="1.5"/>
  <text x="120" y="135" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2a37">Feature request</text>
  <text x="120" y="156" text-anchor="middle" font-size="11.5" fill="#6b7787">"add a loyalty tier</text>
  <text x="120" y="171" text-anchor="middle" font-size="11.5" fill="#6b7787">to orders"</text>

  <rect x="250" y="100" width="200" height="84" rx="10" fill="#ecfdf5" stroke="#0f766e" stroke-width="2.5"/>
  <text x="350" y="132" text-anchor="middle" font-size="14" font-weight="700" fill="#0f5e54">SDD agent (Planner)</text>
  <text x="350" y="153" text-anchor="middle" font-size="11.5" fill="#0f766e">asks: "what does this</text>
  <text x="350" y="168" text-anchor="middle" font-size="11.5" fill="#0f766e">feature touch?"</text>

  <rect x="500" y="100" width="220" height="84" rx="10" fill="#f8fafc" stroke="#b9c4d0" stroke-width="1.5"/>
  <text x="610" y="132" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2a37">Spec / story</text>
  <text x="610" y="153" text-anchor="middle" font-size="11.5" fill="#6b7787">+ cross-service impact</text>
  <text x="610" y="168" text-anchor="middle" font-size="11.5" fill="#6b7787">(services · APIs · events)</text>

  <rect x="770" y="100" width="200" height="84" rx="10" fill="#ecfdf5" stroke="#0f766e" stroke-width="2.5"/>
  <text x="870" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#0f5e54">Agent implements</text>
  <text x="870" y="150" text-anchor="middle" font-size="11.5" fill="#0f766e">automated — writes code</text>
  <text x="870" y="165" text-anchor="middle" font-size="11.5" fill="#0f766e">from the approved spec</text>

  <line x1="210" y1="142" x2="248" y2="142" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="450" y1="142" x2="498" y2="142" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="720" y1="142" x2="768" y2="142" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
  <text x="744" y="123" text-anchor="middle" font-size="9" fill="#64748b">human</text>
  <text x="744" y="135" text-anchor="middle" font-size="9" fill="#64748b">approves</text>

  <rect x="250" y="296" width="200" height="86" rx="10" fill="#fffbeb" stroke="#b45309" stroke-width="2"/>
  <text x="350" y="326" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Knowledge Base</text>
  <text x="350" y="347" text-anchor="middle" font-size="11.5" fill="#9a6a18">the system's facts:</text>
  <text x="350" y="363" text-anchor="middle" font-size="11.5" fill="#9a6a18">APIs · events · dependencies</text>
  <line x1="350" y1="296" x2="350" y2="186" stroke="#b45309" stroke-width="2.5" marker-end="url(#arAmber)"/>
  <text x="365" y="246" font-size="11.5" font-weight="700" fill="#b45309">consults</text>

  <text x="40" y="418" font-size="12.5" fill="#475569">If the knowledge base can't reveal cross-service impact, the spec misses it — and SDD confidently ships a break. <tspan font-weight="700" fill="#92400e">The KB caps the spec.</tspan></text>
</svg>

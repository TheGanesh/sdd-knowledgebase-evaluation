<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
    <marker id="mGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0f766e"/>
    </marker>
    <style>.mono{ font-family:'SF Mono','Menlo','Consolas',monospace }</style>
  </defs>

  <rect width="1000" height="540" fill="#ffffff"/>
  <text x="24" y="34" font-size="20" font-weight="700" fill="#1f2a37">From feature to story — the agent queries, then writes</text>
  <text x="24" y="54" font-size="12" fill="#6b7787">The agent runs <tspan class="mono" font-weight="700">/feature-to-story</tspan> and calls the catalog instead of scanning the codebases.</text>

  <g>
    <rect x="24" y="78" width="200" height="86" rx="10" fill="#f8fafc" stroke="#b9c4d0" stroke-width="1.5"/>
    <text x="124" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2a37">1 · Feature story</text>
    <text x="124" y="134" text-anchor="middle" font-size="11.5" fill="#6b7787">acceptance criteria</text>

    <rect x="268" y="78" width="200" height="86" rx="10" fill="#f8fafc" stroke="#b9c4d0" stroke-width="1.5"/>
    <text x="368" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2a37">2 · Find entry points</text>
    <text x="368" y="134" text-anchor="middle" font-size="11.5" fill="#6b7787">which services change</text>

    <rect x="512" y="78" width="200" height="86" rx="10" fill="#f8fafc" stroke="#b9c4d0" stroke-width="1.5"/>
    <text x="612" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2a37">3 · Compute impact</text>
    <text x="612" y="134" text-anchor="middle" font-size="11.5" fill="#6b7787">who else is affected</text>

    <rect x="756" y="78" width="200" height="86" rx="10" fill="#f8fafc" stroke="#b9c4d0" stroke-width="1.5"/>
    <text x="856" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2a37">4 · Pull contracts</text>
    <text x="856" y="134" text-anchor="middle" font-size="11.5" fill="#6b7787">request / response</text>

    <line x1="224" y1="121" x2="266" y2="121" stroke="#475569" stroke-width="2" marker-end="url(#m)"/>
    <line x1="468" y1="121" x2="510" y2="121" stroke="#475569" stroke-width="2" marker-end="url(#m)"/>
    <line x1="712" y1="121" x2="754" y2="121" stroke="#475569" stroke-width="2" marker-end="url(#m)"/>
  </g>

  <rect x="268" y="250" width="688" height="64" rx="12" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.5"/>
  <text x="280" y="242" font-size="12" font-weight="700" fill="#0f5e54">catalog-mcp · SSE :3002</text>

  <rect x="276" y="264" width="184" height="36" rx="18" fill="#ffffff" stroke="#0f766e"/>
  <text x="368" y="287" text-anchor="middle" class="mono" font-size="11" fill="#0f5e54">search / list_services</text>
  <rect x="512" y="264" width="200" height="36" rx="18" fill="#ffffff" stroke="#0f766e"/>
  <text x="612" y="287" text-anchor="middle" class="mono" font-size="10.5" fill="#0f5e54">impact_report · get_dependents</text>
  <rect x="764" y="264" width="184" height="36" rx="18" fill="#ffffff" stroke="#0f766e"/>
  <text x="856" y="287" text-anchor="middle" class="mono" font-size="11" fill="#0f5e54">get_api · get_deps</text>

  <line x1="368" y1="250" x2="368" y2="166" stroke="#0f766e" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#mGreen)"/>
  <line x1="612" y1="250" x2="612" y2="166" stroke="#0f766e" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#mGreen)"/>
  <line x1="856" y1="250" x2="856" y2="166" stroke="#0f766e" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#mGreen)"/>
  <text x="378" y="210" font-size="10.5" fill="#0f766e">calls</text>

  <line x1="612" y1="314" x2="612" y2="356" stroke="#475569" stroke-width="2" marker-end="url(#m)"/>
  <text x="624" y="340" font-size="10.5" fill="#475569">fills</text>

  <rect x="24" y="360" width="932" height="158" rx="12" fill="#fff7ed" stroke="#b45309" stroke-width="1.8"/>
  <text x="44" y="388" font-size="15" font-weight="700" fill="#92400e">5 · Spec — Cross-Service Impact   (per app · per API)</text>
  <text x="44" y="418" font-size="12.5" fill="#334155">●  Affected services (count + list)<tspan fill="#9a6a18">  ← impact_report</tspan></text>
  <text x="44" y="442" font-size="12.5" fill="#334155">●  Per-API request / response + samples<tspan fill="#9a6a18">  ← get_api</tspan></text>
  <text x="500" y="418" font-size="12.5" fill="#334155">●  Outbound / downstream calls<tspan fill="#9a6a18">  ← get_dependencies</tspan></text>
  <text x="500" y="442" font-size="12.5" fill="#334155">●  DB / Cache / Kafka deltas<tspan fill="#9a6a18">  ← graph</tspan></text>
  <text x="44" y="478" font-size="12" font-style="italic" fill="#475569">Every impact claim is computed and re-checkable — never "no other services affected" without a get_dependents proof.</text>
  <text x="44" y="500" font-size="11.5" fill="#6b7787">Then: stop for human approval (the Planner does not start implementation).</text>
</svg>

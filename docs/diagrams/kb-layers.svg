<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
    <style>.mono{ font-family:'SF Mono','Menlo','Consolas',monospace }</style>
  </defs>

  <rect width="900" height="440" fill="#ffffff"/>
  <text x="40" y="36" font-size="20" font-weight="700" fill="#1f2a37">Structured source, generated views — layered, not either/or</text>
  <text x="40" y="56" font-size="12" fill="#6b7787">You keep both: one is the source of truth, the other is generated from it.</text>

  <!-- structured -->
  <rect x="60" y="86" width="320" height="128" rx="12" fill="#f1fbf8" stroke="#0f766e" stroke-width="2"/>
  <text x="80" y="114" font-size="15" font-weight="700" fill="#0f5e54">Structured catalog</text>
  <text x="80" y="132" font-size="11.5" font-weight="700" fill="#0f766e">source of truth · machine-queried</text>
  <text x="80" y="156" class="mono" font-size="11.5" fill="#334155">catalog-info · openapi · asyncapi</text>
  <text x="80" y="176" class="mono" font-size="11.5" fill="#334155">→ graph.json · reverse-index.json</text>
  <text x="80" y="198" font-size="11.5" fill="#64748b">queried via MCP for impact analysis</text>

  <!-- markdown -->
  <rect x="520" y="86" width="320" height="128" rx="12" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="540" y="114" font-size="15" font-weight="700" fill="#334155">Markdown view</text>
  <text x="540" y="132" font-size="11.5" font-weight="700" fill="#64748b">generated · human-read</text>
  <text x="540" y="156" class="mono" font-size="11.5" fill="#334155">views/markdown/index.md</text>
  <text x="540" y="176" class="mono" font-size="11.5" fill="#334155">views/markdown/&lt;svc&gt;.md</text>
  <text x="540" y="198" font-size="11.5" fill="#64748b">readable, zero infra, never drifts</text>

  <line x1="380" y1="150" x2="518" y2="150" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="449" y="142" text-anchor="middle" font-size="11.5" fill="#475569">generates</text>
  <text x="449" y="170" text-anchor="middle" font-size="10.5" fill="#94a3b8">(no drift)</text>

  <!-- judge -->
  <line x1="220" y1="214" x2="360" y2="286" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="680" y1="214" x2="540" y2="286" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="300" y="290" width="300" height="74" rx="12" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.8"/>
  <text x="450" y="320" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">LLM-as-judge</text>
  <text x="450" y="342" text-anchor="middle" font-size="11.5" fill="#7f1d1d">rubric · pairwise (story = ground truth)</text>

  <!-- verdict -->
  <rect x="222" y="386" width="456" height="38" rx="19" fill="#1f2a37"/>
  <text x="450" y="410" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">Verdict: Graph-MCP 0.97 · RAG 0.74 · Markdown 0.67 → use both</text>
</svg>
